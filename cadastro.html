<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beppu | Cadastro</title>
    <link rel="icon" type="image/png" sizes="192x192" href="assets/img/logo_img.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="listar()">
    <!-- HEADER -->
<header class="header">
    <div class="logo">
        <a href="/index.html"><img src="assets/img/logo.png" href="/index.html"></a>
    </div>


    <nav class="menu">
        <a href="index.html#home">Home</a>
        <a href="index.html#cultura">Cultura</a>
        <a href="/index.html#onsens">Onsens</a>
        <a href="/index.html#turismo">Turismo</a>
        <a href="index.html#quiz">Quiz</a>
    </nav>

    <div class="acoes">
        <button class="btn-outline">Entrar</button>
        <button class="btn-primary"><a href="/cadastro.html">Cadastrar</a></button>
    </div>
</header>

<div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
           <div class="campo">
            <span>CPF:</span>
            <input id="cpf_input" type="text" placeholder="Seu CPF" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>
    
</body>
</html>
